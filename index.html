<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Camera Background</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

<!-- スマホライブラリから画像選択 -->
<input type="file" id="imageInput" accept="image/png, image/jpeg" style="position:absolute; top:10px; left:10px; z-index:10;">

<script>
let camera, scene, renderer;
let imagePlane;

// カメラ用ビデオ要素
const video = document.createElement('video');
video.autoplay = true;
video.playsInline = true;

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
  .then(stream => { video.srcObject = stream; })
  .catch(err => { console.error("カメラアクセスエラー", err); });

init();
animate();

function init() {
    scene = new THREE.Scene();

    // カメラ
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // レンダラー
    renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ビデオを背景にする
    const videoTexture = new THREE.VideoTexture(video);
    scene.background = videoTexture;

    // 初期Plane（空でもOK）
    const geometry = new THREE.PlaneGeometry(1, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
    imagePlane = new THREE.Mesh(geometry, material);
    imagePlane.position.set(0, 0, -2);
    scene.add(imagePlane);

    // スマホライブラリ選択時
    const input = document.getElementById("imageInput");
    input.addEventListener("change", function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const texture = new THREE.TextureLoader().load(e.target.result, () => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const ratio = img.width / img.height;
                    imagePlane.geometry.dispose();
                    imagePlane.geometry = new THREE.PlaneGeometry(ratio, 1);
                }
            });
            imagePlane.material.map = texture;
            imagePlane.material.transparent = true;
            imagePlane.material.needsUpdate = true;
        };
        reader.readAsDataURL(file);
    });

    window.addEventListener("resize", onWindowResize);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    renderer.setAnimationLoop(render);
}

function render() {
    if (imagePlane) {
        imagePlane.quaternion.copy(camera.quaternion); // 常にカメラ正面
    }
    renderer.render(scene, camera);
}
</script>

</body>
</html>
